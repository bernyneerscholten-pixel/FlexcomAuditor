<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexcom Device Auditor</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
</head>
<body>
    <h1>Flexcom Device Auditor</h1>
    <div id="reader" style="width:300px"></div>
    <form id="deviceForm">
        <input type="text" id="omschrijving" placeholder="Omschrijving" required><br>
        <input type="text" id="ip_intern" placeholder="IP Intern"><br>
        <input type="text" id="sn" placeholder="SN / Barcode"><br>
        <input type="text" id="mac" placeholder="MAC Adres"><br>
        <button type="submit">Opslaan</button>
    </form>
    <button onclick="exportToExcel()">Export naar Excel</button>

    <script>
        const firebaseConfig = { /* PLAK HIER JE CONFIG VAN STAP 1 */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // QR Scanner setup
        function onScanSuccess(decodedText) {
            document.getElementById('sn').value = decodedText;
        }
        new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 }).render(onScanSuccess);

        // Opslaan naar Firebase
        document.getElementById('deviceForm').addEventListener('submit', (e) => {
            e.preventDefault();
            db.ref('devices/').push({
                omschrijving: document.getElementById('omschrijving').value,
                ip: document.getElementById('ip_intern').value,
                sn: document.getElementById('sn').value
            });
            alert('Opgeslagen!');
        });
    </script>
</body>
</html>
