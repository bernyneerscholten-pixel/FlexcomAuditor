<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexcom Device Auditor</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Flexcom Auditor">
    <meta name="theme-color" content="#004a99">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        .flexcom-blue { background-color: #004a99; }
        .flexcom-text { color: #004a99; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <header class="flexcom-blue text-white p-4 shadow-lg">
        <h1 class="text-xl font-bold">Flexcom Device Auditor</h1>
    </header>

    <main class="p-4 max-w-2xl mx-auto">
        <div class="bg-blue-100 p-3 rounded mb-6 text-blue-800 font-semibold text-center">
            Totaal apparaten: <span id="deviceCount">0</span>
        </div>

        <div class="bg-white p-6 rounded-lg shadow mb-6">
            <h2 class="font-bold mb-4 flexcom-text">Scanner Instellingen</h2>
            <select id="scanTarget" class="w-full border p-2 rounded mb-4">
                <option value="sn">Scan naar: SN / Barcode</option>
                <option value="mac">Scan naar: MAC Adres</option>
                <option value="ip_intern">Scan naar: IP Intern</option>
            </select>
            <div id="reader" class="w-full"></div>
        </div>

        <form id="deviceForm" class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-lg font-bold mb-4 flexcom-text">Apparaat toevoegen</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <select id="monteur" class="border p-2 rounded md:col-span-2 bg-blue-50 font-bold" required>
                    <option value="">-- Kies monteur --</option>
                    <option value="Berny">Berny</option>
                    <option value="Bas">Bas</option>
                    <option value="Vincent">Vincent</option>
                    <option value="Roy">Roy</option>
                    <option value="Jasper">Jasper</option>
                    <option value="Joey">Joey</option>
                </select>
                <input type="text" id="omschrijving" placeholder="Omschrijving" class="border p-2 rounded" required>
                <input type="text" id="ip_intern" placeholder="IP Intern" class="border p-2 rounded">
                <input type="text" id="ip_extern" placeholder="IP Extern" class="border p-2 rounded">
                <input type="text" id="sn" placeholder="SN / Barcode" class="border p-2 rounded">
                <input type="text" id="mac" placeholder="MAC Adres" class="border p-2 rounded">
                <input type="text" id="opmerking" placeholder="Opmerking" class="border p-2 rounded md:col-span-2">
            </div>
            <button type="button" onclick="pushToDatabase()" class="mt-4 w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">
                + Toevoegen aan lijst
            </button>
        </form>

        <div class="mt-6 bg-white p-4 rounded-lg shadow">
            <h2 class="font-bold mb-2 flexcom-text">Live Inventaris</h2>
            <input type="text" id="searchBox" onkeyup="renderList()" placeholder="Zoeken..." class="w-full border p-2 mb-4 rounded">
            <div id="batchList" class="text-sm mb-4">Lijst laden...</div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="exportToExcel()" class="bg-green-600 text-white p-2 rounded font-bold">Export CSV</button>
                <button onclick="clearAll()" class="bg-red-600 text-white p-2 rounded font-bold">Wis database</button>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC3VS2-Zl723xGngcV9zZSmF4wQorcvl60",
            authDomain: "flexcom-auditor.firebaseapp.com",
            projectId: "flexcom-auditor",
            storageBucket: "flexcom-auditor.firebasestorage.app",
            messagingSenderId: "857157360938",
            appId: "1:857157360938:web:4d012f61ae3fe94c209253",
            databaseURL: "https://flexcom-auditor-default-rtdb.europe-west1.firebasedatabase.app"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let allDevices = {};

        db.ref('devices/').on('value', (snapshot) => {
            allDevices = snapshot.val() || {};
            document.getElementById('deviceCount').innerText = Object.keys(allDevices).length;
            renderList();
        });

        function renderList() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            const list = document.getElementById('batchList');
            const filtered = Object.entries(allDevices).filter(([key, item]) => 
                item.omschrijving.toLowerCase().includes(searchTerm) || 
                item.sn.toLowerCase().includes(searchTerm) ||
                item.monteur.toLowerCase().includes(searchTerm)
            );
            
            list.innerHTML = filtered.length === 0 ? "Geen apparaten gevonden." : 
                filtered.map(([key, item]) => `
                    <div class="flex justify-between items-center bg-gray-50 p-2 mb-1 rounded border">
                        <span>${item.omschrijving} (${item.sn}) - <b>${item.monteur}</b></span>
                        <button onclick="removeFromDatabase('${key}')" class="text-red-500 font-bold px-2">X</button>
                    </div>
                `).join('');
        }

        // Verbeterde scanner functie die data opschoont
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (decodedText) => {
            // Verwijder 'MAC', 'SN', en alle niet-alfanumerieke tekens
            const cleanData = decodedText.replace(/MAC:|SN:|Barcode:|S\/N:/gi, '').replace(/[^a-zA-Z0-9]/g, '');
            const target = document.getElementById('scanTarget').value;
            document.getElementById(target).value = cleanData;
        }).catch(err => console.log("Camera niet gestart: " + err));

        function pushToDatabase() {
            const monteur = document.getElementById('monteur').value;
            if(!monteur) return alert("Selecteer eerst een monteur!");
            db.ref('devices/').push({
                monteur: monteur,
                omschrijving: document.getElementById('omschrijving').value,
                ip_intern: document.getElementById('ip_intern').value,
                ip_extern: document.getElementById('ip_extern').value,
                sn: document.getElementById('sn').value,
                mac: document.getElementById('mac').value,
                opmerking: document.getElementById('opmerking').value,
                timestamp: new Date().toLocaleString()
            });
            document.getElementById('deviceForm').reset();
            document.getElementById('monteur').value = monteur;
        }

        function removeFromDatabase(key) { if(confirm("Verwijderen?")) db.ref('devices/' + key).remove(); }

        function clearAll() { if(confirm("Wis database volledig?")) db.ref('devices/').remove(); }

        function exportToExcel() {
            let data = [['Monteur', 'Omschrijving', 'IP Intern', 'IP Extern', 'SN', 'MAC', 'Opmerking', 'Tijd']];
            Object.values(allDevices).forEach(v => {
                data.push([v.monteur, v.omschrijving, v.ip_intern, v.ip_extern, v.sn, v.mac, v.opmerking, v.timestamp]);
            });
            let csv = "data:text/csv;charset=utf-8," + data.map(e => e.join(",")).join("\n");
            let link = document.createElement("a");
            link.setAttribute("href", encodeURI(csv));
            link.setAttribute("download", "Flexcom_Inventaris.csv");
            document.body.appendChild(link);
            link.click();
        }
    </script>
</body>
</html>
