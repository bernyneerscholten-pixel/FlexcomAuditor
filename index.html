<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexcom Device Auditor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        .flexcom-blue { background-color: #004a99; }
        .flexcom-text { color: #004a99; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <header class="flexcom-blue text-white p-4 shadow-lg">
        <h1 class="text-xl font-bold">Flexcom Device Auditor</h1>
    </header>

    <main class="p-4 max-w-2xl mx-auto">
        
        <div class="bg-white p-4 rounded-lg shadow mb-6">
            <h2 class="font-bold mb-2 flexcom-text">Barcode / QR Scanner</h2>
            <div id="reader" class="w-full"></div>
        </div>

        <form id="deviceForm" class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-lg font-bold mb-4 flexcom-text">Apparaat toevoegen aan batch</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="omschrijving" placeholder="Omschrijving" class="border p-2 rounded">
                <input type="text" id="ip_intern" placeholder="IP Intern" class="border p-2 rounded">
                <input type="text" id="ip_extern" placeholder="IP Extern" class="border p-2 rounded">
                <input type="text" id="sn" placeholder="SN / Barcode" class="border p-2 rounded bg-yellow-50">
                <input type="text" id="mac" placeholder="MAC Adres" class="border p-2 rounded">
                <input type="text" id="gebruikersnaam" placeholder="Gebruikersnaam" class="border p-2 rounded">
                <input type="text" id="wachtwoord" placeholder="Wachtwoord" class="border p-2 rounded">
                <input type="text" id="opmerking" placeholder="Opmerking" class="border p-2 rounded md:col-span-2">
            </div>
            <button type="button" onclick="addToBatch()" class="mt-4 w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">
                + Toevoegen aan lijst
            </button>
        </form>

        <div class="mt-6 bg-white p-4 rounded-lg shadow">
            <h2 class="font-bold mb-2 flexcom-text">Huidige Batch (Lijst)</h2>
            <div id="batchList" class="text-sm mb-4 italic text-gray-500">Geen apparaten toegevoegd.</div>
            <div class="flex gap-2">
                <button onclick="saveBatch()" class="flex-1 bg-green-600 text-white p-2 rounded font-bold">Verstuur naar Database</button>
                <button onclick="exportToExcel()" class="bg-gray-600 text-white p-2 rounded text-white">Export CSV</button>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC3VS2-Zl723xGngcV9zZSmF4wQorcvl60",
            authDomain: "flexcom-auditor.firebaseapp.com",
            projectId: "flexcom-auditor",
            storageBucket: "flexcom-auditor.firebasestorage.app",
            messagingSenderId: "857157360938",
            appId: "1:857157360938:web:4d012f61ae3fe94c209253",
            databaseURL: "https://flexcom-auditor-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let batch = [];

        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (decodedText) => {
            document.getElementById('sn').value = decodedText;
        }).catch(err => console.log("Camera kon niet worden gestart: " + err));

        function addToBatch() {
            const item = {
                omschrijving: document.getElementById('omschrijving').value,
                ip_intern: document.getElementById('ip_intern').value,
                ip_extern: document.getElementById('ip_extern').value,
                sn: document.getElementById('sn').value,
                mac: document.getElementById('mac').value,
                gebruikersnaam: document.getElementById('gebruikersnaam').value,
                wachtwoord: document.getElementById('wachtwoord').value,
                opmerking: document.getElementById('opmerking').value
            };
            batch.push(item);
            updateBatchUI();
            document.getElementById('deviceForm').reset();
        }

        function updateBatchUI() {
            const list = document.getElementById('batchList');
            list.innerHTML = batch.length === 0 ? "Geen apparaten toegevoegd." : 
                             batch.map((item, index) => `${index+1}. ${item.omschrijving} (${item.sn})`).join('<br>');
        }

        function saveBatch() {
            if(batch.length === 0) return alert('Lijst is leeg!');
            
            let updates = {};
            batch.forEach(item => {
                const newKey = db.ref('devices').push().key;
                updates['/devices/' + newKey] = item;
            });

            db.ref().update(updates)
                .then(() => {
                    batch = [];
                    updateBatchUI();
                    alert('Batch succesvol verstuurd naar de database!');
                })
                .catch(err => alert('Fout bij opslaan: ' + err.message));
        }

        function exportToExcel() {
            db.ref('devices/').once('value').then((snapshot) => {
                let data = [['Omschrijving', 'IP Intern', 'IP Extern', 'SN', 'MAC', 'Gebruikersnaam', 'Wachtwoord', 'Opmerking']];
                snapshot.forEach(child => {
                    const v = child.val();
                    data.push([v.omschrijving, v.ip_intern, v.ip_extern, v.sn, v.mac, v.gebruikersnaam, v.wachtwoord, v.opmerking]);
                });
                let csv = "data:text/csv;charset=utf-8," + data.map(e => e.join(",")).join("\n");
                let link = document.createElement("a");
                link.setAttribute("href", encodeURI(csv));
                link.setAttribute("download", "Flexcom_Inventaris.csv");
                document.body.appendChild(link);
                link.click();
            });
        }
    </script>
</body>
</html>
